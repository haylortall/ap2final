  <style>
    :root {
      --bg: #050505;
      --card: #111;
      --text: #f7f7f7;
      --muted: #aaa;
      --line: #2a2a2a;
      --good: #a7f3d0;
      --bad: #fecaca;
      --soft: #1b1b1b;
    }
    
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .app {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }

    h1, h2, h3 { margin: 0; }
    h1 { font-size: clamp(2rem, 7vw, 4rem); letter-spacing: -.06em; }
    h2 { font-size: clamp(1.5rem, 5vw, 2.5rem); letter-spacing: -.04em; }
    h3 { font-size: 1.05rem; color: var(--muted); font-weight: 500; }

    .sub {
      color: var(--muted);
      margin: 10px 0 20px;
      line-height: 1.45;
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .menu {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    @media (max-width: 520px) {
      .menu { grid-template-columns: 1fr; }
      .app { padding: 16px; border-radius: 18px; }
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: #000;
      font: inherit;
      border-radius: 16px;
      padding: 15px 16px;
      cursor: pointer;
      font-weight: 700;
      text-align: left;
      transition: transform .08s ease, opacity .08s ease, background .08s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: .75; }

    .ghost {
      background: transparent;
      color: var(--text);
    }

    .danger {
      background: transparent;
      color: #ffb4b4;
      border-color: #512323;
    }

    .option {
      width: 100%;
      background: var(--soft);
      color: var(--text);
      font-weight: 600;
    }

    .option.correct { border-color: #48c78e; background: rgba(72,199,142,.16); }
    .option.wrong { border-color: #ff6b6b; background: rgba(255,107,107,.14); }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: .95rem;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--muted);
      white-space: nowrap;
    }

    .question {
      font-size: clamp(1.45rem, 5vw, 2.45rem);
      line-height: 1.08;
      letter-spacing: -.04em;
      margin: 14px 0 20px;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #080808;
      color: var(--text);
      font-size: 1.1rem;
      outline: none;
      margin-bottom: 10px;
    }

    .feedback {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #0a0a0a;
      line-height: 1.45;
    }

    .feedback.good { border-color: rgba(72,199,142,.55); }
    .feedback.bad { border-color: rgba(255,107,107,.55); }

    .small {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.45;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .row button { flex: 1; min-width: 140px; text-align: center; }

    .statgrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 18px 0;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #0b0b0b;
    }

    .stat b { display:block; font-size:1.5rem; margin-bottom: 4px; }

    ul { padding-left: 20px; }
    li { margin: 10px 0; color: #ddd; }
    .answer { color: var(--good); font-weight: 800; }

    .tiny { font-size: .82rem; color: #777; margin-top: 14px; }
  </style>
</head>

    const QUESTIONS = RAW_QUESTIONS.map((q, i) => ({
      id: q.id || `full-${i + 1}`,
      type: q.type || (Array.isArray(q.options) ? "mc" : "fill"),
      category: q.category || "Mixed",
      modeGroup: (q.category || "").startsWith("Exam 3") ? "Exam3" :
                 (q.category || "").startsWith("Exam 4") ? "Exam4" :
                 (q.category || "").startsWith("Quiz") ? "Quiz" : "Mixed",
      question: q.question,
      options: q.options || [],
      answer: q.answer,
      acceptable: q.acceptable || [],
      explanation: q.explanation || "",
      sourceNote: q.sourceNote || ""
    }));

    const STORAGE_KEY = "ap2FinalReviewProgress_v3_logic";
const ROUND_SIZE = 10;
const MASTERED_REQUIRED = 5;
const MISSED_CLEAR_REQUIRED = 2;

let state = {
  screen: "home",
  mode: null,
  round: [],
  index: 0,
  score: 0,
  answered: false,
  userAnswers: []
};

function freshProgress() {
  return {
    missed: {},
    attempts: {},
    correctById: {},
    correctSinceMiss: {},
    answeredIds: [],
    masteredIds: [],
    fullCoverageSeen: [],
    modeSeen: {}
  };
}

function loadProgress() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) return freshProgress();

  try {
    const p = JSON.parse(saved);
    return {
      ...freshProgress(),
      ...p,
      missed: p.missed || {},
      attempts: p.attempts || {},
      correctById: p.correctById || {},
      correctSinceMiss: p.correctSinceMiss || {},
      answeredIds: p.answeredIds || [],
      masteredIds: p.masteredIds || [],
      fullCoverageSeen: p.fullCoverageSeen || [],
      modeSeen: p.modeSeen || {}
    };
  } catch {
    return freshProgress();
  }
}

function saveProgress(progress) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}

function resetProgress() {
  if (confirm("Reset all progress and missed questions?")) {
    localStorage.removeItem(STORAGE_KEY);
    renderHome();
  }
}

function normalize(s) {
  return String(s || "")
    .toLowerCase()
    .replace(/[^\w\s-]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function getMissedIds() {
  return Object.entries(loadProgress().missed || {})
    .filter(([id, data]) => data && data.active)
    .map(([id]) => id);
}

function getMasteredIds() {
  return loadProgress().masteredIds || [];
}

function updateTracking(question, isCorrect) {
  const p = loadProgress();

  p.attempts[question.id] = (p.attempts[question.id] || 0) + 1;

  if (!p.answeredIds.includes(question.id)) {
    p.answeredIds.push(question.id);
  }

  p.correctById[question.id] = p.correctById[question.id] || 0;
  p.correctSinceMiss[question.id] = p.correctSinceMiss[question.id] || 0;

  p.missed = p.missed || {};
  const current = p.missed[question.id] || {
    active: false,
    missedCount: 0
  };

  if (isCorrect) {
    p.correctById[question.id] += 1;

    if (current.active) {
      p.correctSinceMiss[question.id] += 1;

      if (p.correctSinceMiss[question.id] >= MISSED_CLEAR_REQUIRED) {
        current.active = false;
      }
    }

    if (
      p.correctById[question.id] >= MASTERED_REQUIRED &&
      !p.masteredIds.includes(question.id)
    ) {
      p.masteredIds.push(question.id);
    }
  } else {
    current.active = true;
    current.missedCount = (current.missedCount || 0) + 1;
    p.correctSinceMiss[question.id] = 0;
  }

  p.missed[question.id] = current;
  saveProgress(p);
}

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function getQuestionModeLabel(q) {
      if (q.modeGroup === "Exam3") return "Exam 3";
      if (q.modeGroup === "Exam4") return "Exam 4";
      if (q.modeGroup === "Quiz") return "Quiz";
      return q.category || "Mixed";
    }

    function getQuestionsForMode(mode) {
  if (mode === "Exam3") return QUESTIONS.filter(q => q.modeGroup === "Exam3");
  if (mode === "Exam4") return QUESTIONS.filter(q => q.modeGroup === "Exam4");
  if (mode === "Quiz") return QUESTIONS.filter(q => q.modeGroup === "Quiz");

  if (mode === "FullCoverage") {
    const progress = loadProgress();

    const seen = new Set(progress.fullCoverageSeen || []);

    let unseen = QUESTIONS.filter(q => !seen.has(q.id));

    // if all seen, reset cycle
    if (!unseen.length) {
      progress.fullCoverageSeen = [];
      saveProgress(progress);
      unseen = [...QUESTIONS];
    }

    const nextBatch = shuffle(unseen).slice(0, ROUND_SIZE);

    progress.fullCoverageSeen = [
      ...(progress.fullCoverageSeen || []),
      ...nextBatch.map(q => q.id)
    ];

    saveProgress(progress);

    return nextBatch;
  }

  if (mode === "Missed") {
    const ids = getMissedIds();
    return QUESTIONS.filter(q => ids.includes(q.id));
  }

  if (mode === "Mixed") {
    const missed = QUESTIONS.filter(q => getMissedIds().includes(q.id));
    const all = QUESTIONS;
    return [...missed, ...missed, ...all];
  }

  return QUESTIONS;
}

    function startMode(mode) {
  const pool = getQuestionsForMode(mode);

  if (!pool.length) {
    if (mode === "FullCoverage") {
      renderFullCoverageDone();
      return;
    }
    alert(mode === "Missed" ? "No missed questions yet. Iconic." : "No questions found.");
    return;
  }

  const p = loadProgress();
  p.modeSeen = p.modeSeen || {};

  const modeKey = mode;
  const seenForMode = new Set(p.modeSeen[modeKey] || []);

  let available = pool.filter(q => !seenForMode.has(q.id));

  // If you've seen everything in this mode, restart that mode's cycle.
  if (!available.length) {
    p.modeSeen[modeKey] = [];
    available = pool;
  }

  const unique = [];
  const roundSeen = new Set();

  for (const q of shuffle(available)) {
    if (!roundSeen.has(q.id)) {
      unique.push(q);
      roundSeen.add(q.id);
    }
    if (unique.length >= ROUND_SIZE) break;
  }

  // If there are fewer than 10 unseen left, fill the rest from the full pool,
  // but still avoid duplicates inside this round.
  if (unique.length < ROUND_SIZE) {
    for (const q of shuffle(pool)) {
      if (!roundSeen.has(q.id)) {
        unique.push(q);
        roundSeen.add(q.id);
      }
      if (unique.length >= ROUND_SIZE) break;
    }
  }

  if (mode !== "FullCoverage") {
  p.modeSeen[modeKey] = [
    ...(p.modeSeen[modeKey] || []),
    ...unique.map(q => q.id)
  ];
}

  saveProgress(p);

  state = {
    screen: "quiz",
    mode,
    round: unique.slice(0, ROUND_SIZE),
    index: 0,
    score: 0,
    answered: false,
    userAnswers: [],
    shuffledOptions: {}
  };

  renderQuiz();
}

    function chooseAnswer(value) {
      if (state.answered) return;
      const q = state.round[state.index];
      let isCorrect = false;

      if (q.type === "fill") {
        const user = normalize(value);
        const answers = [q.answer, ...(q.acceptable || [])].map(normalize);
        isCorrect = answers.includes(user);
      } else {
        isCorrect = value === q.answer;
      }

      state.answered = true;
      if (isCorrect) state.score++;

      state.userAnswers.push({
        id: q.id,
        question: q.question,
        user: value,
        correct: q.answer,
        isCorrect,
        explanation: q.explanation
      });

      updateTracking(q, isCorrect);
      if (state.mode === "FullCoverage") {
        const p = loadProgress();
        const seen = new Set(p.fullCoverageSeen || []);
        seen.add(q.id);
        p.fullCoverageSeen = [...seen];
        saveProgress(p);
      }
      renderQuiz();
    }

    function nextQuestion() {
      if (state.index < state.round.length - 1) {
        state.index++;
        state.answered = false;
        renderQuiz();
      } else {
        renderResults();
      }
    }

    function renderFullCoverageDone() {
      const p = loadProgress();
      const activeMissed = getMissedIds().length;
      document.getElementById("app").innerHTML = `
        <h2>Full Coverage complete</h2>
        <p class="sub">You have seen all <b>${QUESTIONS.length}</b> questions in the full bank.</p>
        <div class="statgrid">
          <div class="stat"><b>${p.total || 0}</b><span class="small">answered</span></div>
          <div class="stat"><b>${p.correct || 0}</b><span class="small">correct</span></div>
          <div class="stat"><b>${activeMissed}</b><span class="small">missed active</span></div>
        </div>
        <div class="row">
          <button onclick="startMode('Missed')">Retest missed</button>
          <button class="ghost" onclick="resetFullCoverage()">Restart Full Coverage</button>
          <button class="ghost" onclick="renderHome()">Home</button>
        </div>
      `;
    }

    function resetFullCoverage() {
      const p = loadProgress();
      p.fullCoverageSeen = [];
      saveProgress(p);
      startMode('FullCoverage');
    }

   function renderHome() {
  const p = loadProgress();

  const answeredCount = (p.answeredIds || []).length;

  const activeMissed = Object.values(p.missed || {})
    .filter(m => m.active).length;

  const masteredCount = (p.masteredIds || []).length;

  document.getElementById("app").innerHTML = `
    <h1>AP2 Final Review</h1>
    <p class="sub">${QUESTIONS.length} questions. Tiny chunks. Missed ones come back until your brain stops being rude. Ur welcome! ♡taylor</p>

    <div class="statgrid">
      <div class="stat"><b>${answeredCount}</b><span class="small">answered</span></div>
      <div class="stat"><b>${activeMissed}</b><span class="small">missed</span></div>
      <div class="stat"><b>${masteredCount}</b><span class="small">mastered</span></div>
    </div>

        <div class="grid menu">
          <button onclick="startMode('Exam3')">Exam 3<br><span class="small">Respiratory + digestive + metabolism</span></button>
          <button onclick="startMode('Exam4')">Exam 4<br><span class="small">Urinary + fluids + reproductive</span></button>
          <button onclick="startMode('Quiz')">Quiz Questions<br><span class="small">20 exact screenshot questions</span></button>
          <button onclick="startMode('Mixed')">Mixed Final Mode<br><span class="small">Random from all questions</span></button>
          <button onclick="startMode('FullCoverage')">Full Coverage Review<br><span class="small">See every question before repeats</span></button>
          <button class="ghost" onclick="startMode('Missed')">Missed Questions<br><span class="small">Retest weak spots</span></button>
          <button class="danger" onclick="resetProgress()">Reset Progress<br><span class="small">Clean slate</span></button>
        </div>

        <p class="tiny">Missed questions disappear after you get them correct twice.</p>
      `;
    }

    function renderQuiz() {
      const q = state.round[state.index];
      const last = state.userAnswers[state.userAnswers.length - 1];
      const progress = `Question ${state.index + 1} of ${state.round.length}`;

      let inputHTML = "";
      if (q.type === "fill") {
        inputHTML = `
          <input id="fillInput" placeholder="type answer..." autocomplete="off" ${state.answered ? "disabled" : ""} />
          <button onclick="chooseAnswer(document.getElementById('fillInput').value)">Submit</button>
        `;
      } else {
        const optionSet = state.shuffledOptions[q.id] || shuffle(q.options);
state.shuffledOptions[q.id] = optionSet;

inputHTML = `<div class="grid">` + optionSet.map(opt => {
  let cls = "option";
  if (state.answered) {
    if (opt === q.answer) cls += " correct";
    if (last && opt === last.user && !last.isCorrect) cls += " wrong";
  }
  return `<button class="${cls}" onclick='chooseAnswer(${JSON.stringify(opt)})'>${opt}</button>`;
}).join("") + `</div>`;
      }

      const feedback = state.answered ? `
        <div class="feedback ${last.isCorrect ? "good" : "bad"}">
          <b>${last.isCorrect ? "Correct ✅" : `Not quite — answer: ${q.answer}`}</b>
          <div class="small">${q.explanation}</div>
        </div>
        <div class="row">
          <button onclick="nextQuestion()">Next</button>
          <button class="ghost" onclick="renderHome()">Home</button>
        </div>
      ` : `
        <div class="row">
          <button class="ghost" onclick="renderHome()">Home</button>
        </div>
      `;

      document.getElementById("app").innerHTML = `
        <div class="topbar">
          <span>${state.mode}</span>
          <span class="pill">${progress}</span>
        </div>
        <h3>${q.category}</h3>
        <div class="question">${q.question}</div>
        ${inputHTML}
        ${feedback}
      `;

      const input = document.getElementById("fillInput");
      if (input) {
        input.focus();
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") chooseAnswer(input.value);
        });
      }
    }

    function renderResults() {
      const missed = state.userAnswers.filter(a => !a.isCorrect);
      document.getElementById("app").innerHTML = `
        <h2>Round complete</h2>
        <p class="sub">Score: <b>${state.score}/${state.round.length}</b></p>

        ${missed.length ? `
          <h3>Missed questions</h3>
          <ul>
            ${missed.map(m => `
              <li>
                ${m.question}<br>
                <span class="small">You said: ${m.user || "(blank)"}</span><br>
                <span class="answer">Answer: ${m.correct}</span><br>
                <span class="small">${m.explanation}</span>
              </li>
            `).join("")}
          </ul>
        ` : `<p class="sub">No misses. That was rude of you to the exam.</p>`}

        <div class="row">
          <button onclick="startMode('${state.mode}')">Do another chunk</button>
          <button class="ghost" onclick="startMode('Missed')">Retest missed</button>
          <button class="ghost" onclick="renderHome()">Home</button>
        </div>
      `;
    }

    renderHome();
  </script>
